name: Build Portable Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: mvn -B clean package

      - name: Copy runtime dependencies
        run: mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/dependency

      - name: Prepare app input folder
        shell: powershell
        run: |
          mkdir app-input
          Copy-Item target\*.jar app-input\
          Copy-Item target\dependency\*.jar app-input\

      - name: Find built JAR
        shell: powershell
        run: |
          $jar = Get-ChildItem -Path app-input -Filter "*.jar" | Where-Object { $_.Name -notlike "*sources*" -and $_.Name -notlike "*javadoc*" -and $_.Name -like "PelletPursuit*" } | Select-Object -First 1
          echo "JAR_NAME=$($jar.Name)" >> $env:GITHUB_ENV

      - name: Create portable Windows app folder
        shell: powershell
        run: |
          mkdir installer
          jpackage `
            --type app-image `
            --name PelletPursuit `
            --input app-input `
            --main-jar $env:JAR_NAME `
            --main-class game.GameApp `
            --dest installer

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: PelletPursuit-Portable-Windows
          path: installer/
