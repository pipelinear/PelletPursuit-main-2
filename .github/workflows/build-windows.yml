name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: mvn -B clean package

      - name: Find built JAR
        shell: powershell
        run: |
          $jar = Get-ChildItem -Path target -Filter "*.jar" | Where-Object { $_.Name -notlike "*sources*" -and $_.Name -notlike "*javadoc*" } | Select-Object -First 1
          echo "JAR_NAME=$($jar.Name)" >> $env:GITHUB_ENV

      - name: Create Windows EXE
        shell: powershell
        run: |
          mkdir installer
          jpackage `
            --type exe `
            --name PelletPursuit `
            --input target `
            --main-jar $env:JAR_NAME `
            --dest installer `
            --win-shortcut `
            --win-menu

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PelletPursuit-Windows-EXE
          path: installer/*.exe
